user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 1024;
}

http {
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	access_log /dev/stdout;
	error_log /dev/stderr;

	server {
		# The start.sh script will dynamically replace this 80 with Render's $PORT
		listen 80;
		server_name _;

		# Route Webhook traffic to the FastAPI Backend (Port 8000)
		location /webhook/ {
			proxy_pass http://127.0.0.1:8000/webhook/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}

		# Route all other traffic to the Streamlit Frontend (Port 8501)
		location / {
			proxy_pass http://127.0.0.1:8501/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
            
            # Streamlit requires WebSocket support
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_read_timeout 86400;
		}
        
        # Specific route for Streamlit's WebSocket connection
        location /_stcore/stream {
            proxy_pass http://127.0.0.1:8501/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
	}
}
