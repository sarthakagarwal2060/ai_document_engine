server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # This is incredibly important for React Apps!
        # It tells Nginx to redirect all 404s back to index.html 
        # so React Router can handle the URL changes.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like images and CSS for performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
